name: Deploy

on:
  push:
    branches: [main]

# Required for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; don't cancel in-progress deploys
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Build API
        run: python scripts/build_api.py

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: yarn
          cache-dependency-path: app/yarn.lock

      - name: Install Node dependencies
        run: yarn --cwd app install --frozen-lockfile

      - name: Build site
        run: yarn --cwd app build
        # If deploying to https://tribulnation.github.io/catalogue/ (no custom domain),
        # uncomment the following and set kit.paths.base in svelte.config.js:
        # env:
        #   BASE_PATH: /catalogue

      - uses: actions/upload-pages-artifact@v3
        with:
          path: app/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
